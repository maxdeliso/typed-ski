name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "24 10 * * 3"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, c-cpp]

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build artifacts
        if: matrix.language == 'c-cpp'
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make build-internal

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
