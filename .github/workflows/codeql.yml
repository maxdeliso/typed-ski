name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "24 10 * * 3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          # c-cpp uses build-mode: none (buildless extraction): CodeQL walks
          # the source tree and analyses the .c/.h files directly. Wiring up
          # build-mode: manual against Bazel proved fragile — Bazel's cc
          # toolchain ignores the CC/CXX env vars that codeql-init sets, so
          # the compiler interceptor sees zero compilations and CodeQL fails
          # the run ("CodeQL could not process any code written in C/C++").
          # Buildless analysis covers our case fine; the C codebase is small
          # and lives entirely under core/.
          - language: c-cpp
            build-mode: none

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
