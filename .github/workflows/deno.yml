name: Bazel CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Read Deno version
        id: deno_version
        shell: bash
        run: |
          version=$(node -p "JSON.parse(require('fs').readFileSync('deno.jsonc', 'utf8')).toolchain.deno")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ steps.deno_version.outputs.version }}

      - name: Prepare hermetic Zig cache (Linux)
        if: runner.os == 'Linux'
        run: mkdir -p /tmp/zig-cache

      - name: Prepare hermetic Zig cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: New-Item -ItemType Directory -Force C:\Temp\zig-cache | Out-Null

      - name: Build native Bazel targets
        run: bazel build //:thanatos //:performance_test //:release_wasm

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Generate bounded perf stats
        run: bazel run //:performance_test -- 8 67108864 512 5 1000 1775005854

      - name: Run format check
        run: bazel run //:fmt_check

      - name: Run lint
        run: bazel run //:lint

      - name: Run typecheck
        run: bazel run //:typecheck

      - name: Build distributable artifacts
        run: bazel run //:build

      - name: Run sharded Deno tests
        run: bazel test //:deno_tests --test_output=errors

      - name: Generate coverage
        if: matrix.os == 'ubuntu-24.04'
        run: bazel run //:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: JSR dry run publish
        if: matrix.os == 'ubuntu-24.04' && github.ref != 'refs/heads/main'
        run: deno publish --dry-run
