name: Nix CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build artifacts
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make build-internal

      - name: Thanatos smoke test (exit code 0)
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make thanatos-check-internal

      - name: Generate coverage report
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make coverage-internal

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Print WASM files
        run: |
          ls -lh wasm/
          nix --extra-experimental-features 'nix-command flakes' develop --command make print-wasm-internal

      - name: JSR dry run publish
        if: github.ref != 'refs/heads/main'
        run: nix run .#publish -- --dry-run
