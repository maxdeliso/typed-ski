name: Bazel CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.6.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Prepare hermetic Zig cache (Linux)
        if: runner.os == 'Linux'
        run: mkdir -p /tmp/zig-cache

      - name: Prepare hermetic Zig cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: New-Item -ItemType Directory -Force C:\Temp\zig-cache | Out-Null

      - name: Build native Bazel targets
        run: bazel build //:thanatos //:performance_test //:release_wasm

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Generate bounded perf stats
        run: bazel run //:performance_test -- 8 67108864 512 5 1000 1775005854

      - name: Run format check
        run: bazel run //:fmt_check

      - name: Run lint
        run: bazel run //:lint

      - name: Run typecheck
        run: bazel run //:typecheck

      - name: Build distributable artifacts
        run: bazel run //:dist

      - name: Run Node tests (Windows)
        if: matrix.os == 'windows-2025'
        run: bazel test //:node_tests --test_output=errors

      - name: Run Node tests and collect coverage (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          bazel coverage //:node_tests --test_output=errors
          # Search for all coverage.dat files in bazel-testlogs and merge them.
          find bazel-testlogs -name "coverage.dat" -exec cat {} + > coverage.lcov
          if [[ ! -s coverage.lcov ]]; then
            echo "No coverage data collected"
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-test-logs-${{ matrix.os }}
          path: bazel-testlogs/
          if-no-files-found: ignore

      - name: Setup Deno (for JSR dry run)
        if: matrix.os == 'ubuntu-24.04' && github.ref != 'refs/heads/main'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: JSR dry run publish
        if: matrix.os == 'ubuntu-24.04' && github.ref != 'refs/heads/main'
        run: deno publish --dry-run --config jsr.json
