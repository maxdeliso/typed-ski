name: Bazel CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BAZEL_TOOLCHAINS_MSVC_ACCEPT_MICROSOFT_VISUAL_STUDIO_BUILDTOOLS_EULA: "1"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04
          - windows-2025

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26.1.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Build native Bazel targets
        run: bazel build //:thanatos //:performance_test //:trip_hello_world

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Run format check
        run: bazel run //:fmt_check

      - name: Run typecheck
        run: bazel run //:typecheck

      - name: Run Node tests
        if: matrix.os != 'ubuntu-24.04'
        run: bazel test //:node_tests --test_output=errors

      - name: Collect Node test coverage (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          bazel coverage //:node_tests --test_output=errors --nocache_test_results
          echo "Found coverage files:"
          find -L bazel-testlogs -name "coverage.dat" -print || true
          find -L bazel-testlogs -name "coverage.dat" -exec cat {} + > coverage.lcov
          if [[ ! -s coverage.lcov ]]; then
            echo "No coverage data collected"
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bazel-test-logs-${{ matrix.os }}
          path: bazel-testlogs/
          if-no-files-found: ignore

      - name: Setup Deno (for JSR dry run)
        if: matrix.os == 'ubuntu-24.04' && github.ref != 'refs/heads/main'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build and stage distribution artifacts for JSR dry run
        if: matrix.os == 'ubuntu-24.04' && github.ref != 'refs/heads/main'
        run: pnpm run dist

      - name: JSR dry run publish
        if: matrix.os == 'ubuntu-24.04' && github.ref != 'refs/heads/main'
        run: deno publish --dry-run --config jsr.json
