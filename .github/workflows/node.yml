name: Build & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04
          - windows-2022

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Interrogate tool versions
        run: |
          echo "--- Tool Versions ---"
          echo "Node: $(node --version)"
          echo "pnpm: $(pnpm --version)"
          echo "Bazel: $(bazel --version)"
          echo "Clang: $(clang --version | head -n 1)"
          echo "---------------------"

      - name: Build distribution artifacts
        run: pnpm run dist

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Build native Bazel targets
        run: bazel build //consumers/thanatos:thanatos //consumers/thanatos:performance_test //:trip_hello_world

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Run format check
        run: pnpm run fmt:check

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run Node tests
        if: matrix.os != 'ubuntu-24.04'
        run: pnpm run test

      - name: Collect Node test coverage (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bazel-test-logs-${{ matrix.os }}
          path: bazel-testlogs/
          if-no-files-found: ignore

      - name: Setup Deno (for JSR dry run)
        if: matrix.os == 'ubuntu-24.04' && github.event_name == 'pull_request'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: JSR dry run publish
        if: matrix.os == 'ubuntu-24.04' && github.event_name == 'pull_request'
        run: deno publish --dry-run --config jsr.json
