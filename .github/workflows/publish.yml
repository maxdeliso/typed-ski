name: Publish to JSR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bazel and Node dependencies
        uses: ./.github/actions/setup-bazel-node
        with:
          disk-cache: ${{ github.workflow }}
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Build native Bazel targets
        run: bazel build //consumers/thanatos:thanatos

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Run test suite
        run: bazel test //:node_tests --test_output=errors

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bazel-test-logs-publish
          path: bazel-testlogs/
          if-no-files-found: ignore

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --package semantic-release --package @semantic-release/exec --package @semantic-release/github semantic-release
