name: Publish to JSR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Read Deno version
        id: deno_version
        shell: bash
        run: |
          version=$(node -p "JSON.parse(require('fs').readFileSync('deno.jsonc', 'utf8')).toolchain.deno")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ steps.deno_version.outputs.version }}

      - name: Prepare hermetic Zig cache
        run: mkdir -p /tmp/zig-cache

      - name: Build native Bazel targets
        run: bazel build //:thanatos //:release_wasm

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Build artifacts
        run: bazel run //:build

      - name: Run test suite
        run: bazel run //:test

      - name: Publish to JSR (Deno Registry)
        run: deno publish
