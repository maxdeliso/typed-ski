name: Publish to JSR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build artifacts
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make build-internal

      - name: Thanatos smoke test (exit code 0)
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make thanatos-check-internal

      - name: Run test suite
        run: nix --extra-experimental-features 'nix-command flakes' develop --command make test-internal

      - name: Publish to JSR (Deno Registry)
        run: nix run .#publish
