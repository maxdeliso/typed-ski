name: Publish to JSR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build artifacts
        run: make build

      - name: Thanatos smoke test (exit code 0)
        run: make thanatos-check

      - name: Run test suite
        run: make test

      - name: Publish to JSR (Deno Registry)
        run: nix run .#publish
