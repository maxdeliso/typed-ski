name: Publish to JSR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BAZEL_TOOLCHAINS_MSVC_ACCEPT_MICROSOFT_VISUAL_STUDIO_BUILDTOOLS_EULA: "1"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # No host Node.js setup: Bazel provides hermetic Node 26 via
      # rules_nodejs, and every Node-touching command goes through it.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Build native Bazel targets
        run: bazel build //:thanatos

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Build and stage distribution artifacts
        # Use the Bazel target rather than `pnpm run dist`: runs under
        # Bazel's hermetic Node 26 instead of host Node.
        run: bazel run //:dist

      - name: Run test suite
        run: bazel test //:node_tests --test_output=errors

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bazel-test-logs-publish
          path: bazel-testlogs/
          if-no-files-found: ignore

      - name: Setup Deno (for JSR publish)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish to JSR (Deno Registry)
        run: deno publish --config jsr.json
