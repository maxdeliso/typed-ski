name: Publish to JSR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.6.0"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Prepare hermetic Zig cache
        run: mkdir -p /tmp/zig-cache

      - name: Build native Bazel targets
        run: bazel build //:thanatos //:release_wasm

      - name: Run native Bazel tests
        run: bazel test //:native_tests

      - name: Build artifacts
        run: bazel run //:build

      - name: Run test suite
        run: bazel run //:test

      - name: Setup Deno (for JSR publish)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish to JSR (Deno Registry)
        run: deno publish --config jsr.jsonc
